[tools]
go = "1.25.12"
"go:golang.org/x/vuln/cmd/govulncheck" = "v1.6.0"

[tasks.lint]
description = "Run go vet for static analysis"
run = "go vet ./..."

[tasks.build]
description = "Build the archon binary to ./archon-bin"
run = "go build -o archon-bin ./cmd/archon"

[tasks."test:coverage"]
description = "Run all tests with coverage profiling"
run = "go test ./... -coverprofile=coverage.out"

[tasks."test:integration"]
description = "Run integration tests (hits real GitHub API)"
run = "go test ./... -tags=integration"

[tasks.security]
description = "Run govulncheck for vulnerability scanning"
run = "govulncheck ./..."

# Markdown formatting (requires prettier: npm install -g prettier)
[tasks.fmt]
description = "Format markdown files with prettier"
run = "prettier --write \"**/*.md\""

[tasks."fmt:check"]
description = "Check markdown formatting without writing"
run = "prettier --check \"**/*.md\""

# Archon CLI helpers
[tasks.watch]
description = "Start file-watching audit loop (Ctrl-C to stop)"
run = "go run ./cmd/archon watch --target ."

[tasks.audit]
description = "Run a single audit pass on the target project"
run = "go run ./cmd/archon audit --target ."

[tasks.explain]
description = "Explain a specific rule from the standards"
run = 'go run ./cmd/archon explain {{arg(name="rule_id")}} --target .'

[tasks.init]
description = "Scaffold .archon/standards.md in the target project"
run = "go run ./cmd/archon init --target ."

[tasks.init-from]
description = "Scaffold .archon/standards.md inheriting from an org repo (args: org/repo [target])"
run = 'go run ./cmd/archon init --from {{arg(name="org_repo")}} --target {{arg(name="target", default=".")}}'

[tasks.help]
description = "Show CLI help"
run = "go run ./cmd/archon help"